default: &default
  adapter: postgresql
  encoding: unicode
  pool: 5
  host: <%= ENV.fetch("PGHOST", "localhost") %>
  port: 5432
  username: '<%= ENV["POSTGRES_USER"] %>'
  database: '<%= ENV["POSTGRES_DATABASE"] %>'
  password: '<%= ENV["POSTGRES_PASSWORD"] %>'

development:
  <<: *default
  database: arbitr_development

test:
  <<: *default
  username: dima
  database: arbitr_test

staging: *default

production: *default
